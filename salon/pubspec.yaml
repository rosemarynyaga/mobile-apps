name: salon
description: "Smart Salon Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.6.0
  flutter_riverpod: ^2.6.1
  image_picker: ^1.0.7
  pdf: ^3.10.7
  fl_chart: ^1.2.0
  flutter_local_notifications: ^17.2.4
  font_awesome_flutter: ^11.0.0
  intl: ^0.18.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.2
  flutter_spinkit: ^5.2.0
  path_provider: ^2.1.2
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/zuri.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
